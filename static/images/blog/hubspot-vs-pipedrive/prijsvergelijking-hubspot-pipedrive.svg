<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="1200" height="4" fill="#0f2439"/>
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#0f2439">Prijsvergelijking HubSpot vs Pipedrive 2026</text>
  <text x="600" y="77" text-anchor="middle" font-size="15" fill="#64748b">Prijs per gebruiker per maand — alle plannen</text>

  <!-- Legend -->
  <rect x="400" y="95" width="20" height="14" rx="3" fill="#f97316"/>
  <text x="425" y="107" font-size="14" font-weight="600" fill="#f97316">HubSpot</text>
  <rect x="520" y="95" width="20" height="14" rx="3" fill="#2563eb"/>
  <text x="545" y="107" font-size="14" font-weight="600" fill="#2563eb">Pipedrive</text>

  <!-- Plan labels -->
  <text x="250" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Gratis / Trial</text>
  <text x="470" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Basis</text>
  <text x="690" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Middel</text>
  <text x="910" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Geavanceerd</text>

  <!-- Baseline -->
  <line x1="140" y1="500" x2="1060" y2="500" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Gratis/Trial group -->
  <rect x="215" y="470" width="35" height="30" rx="4" fill="#f97316"/>
  <text x="232" y="465" text-anchor="middle" font-size="12" font-weight="600" fill="#f97316">Gratis</text>
  <rect x="260" y="480" width="35" height="20" rx="4" fill="#2563eb"/>
  <text x="277" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">14d trial</text>

  <!-- Basis group: HubSpot €15, Pipedrive €14 -->
  <rect x="435" y="345" width="35" height="155" rx="4" fill="#f97316"/>
  <text x="452" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316">€15</text>
  <rect x="480" y="355" width="35" height="145" rx="4" fill="#2563eb"/>
  <text x="497" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">€14</text>

  <!-- Middel group: HubSpot €90, Pipedrive €39 -->
  <rect x="655" y="148" width="35" height="352" rx="4" fill="#f97316"/>
  <text x="672" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316">€90</text>
  <rect x="700" y="290" width="35" height="210" rx="4" fill="#2563eb"/>
  <text x="717" y="283" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">€39</text>

  <!-- Geavanceerd group: HubSpot €150, Pipedrive €49 -->
  <rect x="875" y="148" width="35" height="352" rx="4" fill="#f97316"/>
  <text x="892" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316">€150</text>
  <rect x="920" y="268" width="35" height="232" rx="4" fill="#2563eb"/>
  <text x="937" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">€49</text>

  <!-- Annotation -->
  <text x="690" y="545" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Het grootste verschil: €90 vs €39 voor automatiseringen</text>

  <text x="600" y="590" text-anchor="middle" font-size="13" fill="#94a3b8">Prijzen gecheckt februari 2026 | bedrijfssoftwaregids.nl</text>
</svg>