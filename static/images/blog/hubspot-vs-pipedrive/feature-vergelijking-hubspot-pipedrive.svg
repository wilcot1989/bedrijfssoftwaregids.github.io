<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="1200" height="4" fill="#0f2439"/>
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#0f2439">Feature vergelijking: HubSpot vs Pipedrive</text>

  <!-- Column headers -->
  <text x="420" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#0f2439">Functie</text>
  <rect x="560" y="78" width="200" height="30" rx="6" fill="#f97316" opacity="0.15"/>
  <text x="660" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#f97316">HubSpot</text>
  <rect x="780" y="78" width="200" height="30" rx="6" fill="#2563eb" opacity="0.15"/>
  <text x="880" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">Pipedrive</text>

  <!-- Rows -->
  <!-- Gratis plan -->
  <line x1="200" y1="125" x2="1000" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="150" text-anchor="middle" font-size="16" fill="#1e293b">Gratis plan</text>
  <text x="660" y="150" text-anchor="middle" font-size="22" fill="#10b981">&#10003;</text>
  <text x="880" y="150" text-anchor="middle" font-size="22" fill="#ef4444">&#10007;</text>

  <!-- E-mail tracking -->
  <line x1="200" y1="170" x2="1000" y2="170" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="195" text-anchor="middle" font-size="16" fill="#1e293b">E-mail tracking</text>
  <text x="660" y="195" text-anchor="middle" font-size="22" fill="#10b981">&#10003;</text>
  <text x="880" y="195" text-anchor="middle" font-size="22" fill="#10b981">&#10003;</text>

  <!-- Pipeline management -->
  <line x1="200" y1="215" x2="1000" y2="215" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="240" text-anchor="middle" font-size="16" fill="#1e293b">Pipeline management</text>
  <text x="660" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#f59e0b">Goed</text>
  <text x="880" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981">Uitstekend</text>

  <!-- E-mailmarketing -->
  <line x1="200" y1="260" x2="1000" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="285" text-anchor="middle" font-size="16" fill="#1e293b">E-mailmarketing</text>
  <text x="660" y="285" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981">Uitgebreid</text>
  <text x="880" y="285" text-anchor="middle" font-size="16" font-weight="600" fill="#f59e0b">Basis + add-on</text>

  <!-- Automatiseringen -->
  <line x1="200" y1="305" x2="1000" y2="305" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="330" text-anchor="middle" font-size="16" fill="#1e293b">Automatiseringen</text>
  <text x="660" y="330" text-anchor="middle" font-size="14" fill="#64748b">Vanaf €90/gebr.</text>
  <text x="880" y="330" text-anchor="middle" font-size="14" fill="#64748b">Vanaf ~€39/gebr.</text>

  <!-- Rapportages -->
  <line x1="200" y1="350" x2="1000" y2="350" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="375" text-anchor="middle" font-size="16" fill="#1e293b">Rapportages</text>
  <text x="660" y="375" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981">Uitgebreid</text>
  <text x="880" y="375" text-anchor="middle" font-size="16" font-weight="600" fill="#f59e0b">Goed</text>

  <!-- Integraties -->
  <line x1="200" y1="395" x2="1000" y2="395" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="420" text-anchor="middle" font-size="16" fill="#1e293b">Integraties</text>
  <text x="660" y="420" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981">1.700+</text>
  <text x="880" y="420" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">400+</text>

  <!-- Mobiele app -->
  <line x1="200" y1="440" x2="1000" y2="440" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="465" text-anchor="middle" font-size="16" fill="#1e293b">Mobiele app</text>
  <text x="660" y="465" text-anchor="middle" font-size="16" font-weight="600" fill="#f59e0b">Goed</text>
  <text x="880" y="465" text-anchor="middle" font-size="16" font-weight="600" fill="#10b981">Zeer goed</text>

  <!-- Trustpilot -->
  <line x1="200" y1="485" x2="1000" y2="485" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="510" text-anchor="middle" font-size="16" fill="#1e293b">Trustpilot score</text>
  <text x="660" y="510" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">1.9/5</text>
  <text x="880" y="510" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">4.5/5</text>
  <line x1="200" y1="530" x2="1000" y2="530" stroke="#e2e8f0" stroke-width="1"/>

  <text x="600" y="590" text-anchor="middle" font-size="13" fill="#94a3b8">Vergelijking februari 2026 | bedrijfssoftwaregids.nl</text>
</svg>