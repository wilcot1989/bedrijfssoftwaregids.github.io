  <rect x="240" y="327" width="266" height="28" rx="4" fill="url(#bar)"/>
  <text x="516" y="347" font-size="15" font-weight="600" fill="#2563eb"> €9,00</text>

  <!-- Notion ~€9 -->
  <text x="220" y="410" text-anchor="end" font-size="17" font-weight="600" fill="#1e293b">Notion</text>
