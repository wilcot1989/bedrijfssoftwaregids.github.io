  <text x="625" y="327" font-size="15" font-weight="600" fill="#2563eb"> €25,00</text>

  <!-- Gripp €29 -->
  <text x="220" y="385" text-anchor="end" font-size="17" font-weight="600" fill="#1e293b">Gripp</text>
  <rect x="240" y="367" width="435" height="28" rx="4" fill="url(#bar)"/>
  <text x="685" y="387" font-size="15" font-weight="600" fill="#2563eb"> €29,00</text>

