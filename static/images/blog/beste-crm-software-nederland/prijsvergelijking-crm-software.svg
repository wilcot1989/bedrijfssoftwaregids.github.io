  <text x="220" y="445" text-anchor="end" font-size="17" font-weight="600" fill="#1e293b">Exact Online</text>
  <rect x="240" y="427" width="660" height="28" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="910" y="447" font-size="15" font-weight="600" fill="#dc2626"> €48,00</text>

