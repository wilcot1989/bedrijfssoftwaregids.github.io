  <text x="460" y="267" font-size="15" font-weight="600" fill="#2563eb"> ~€14,00</text>

  <!-- Salesforce €25 -->
  <text x="220" y="325" text-anchor="end" font-size="17" font-weight="600" fill="#1e293b">Salesforce</text>
