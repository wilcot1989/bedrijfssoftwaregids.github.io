<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg_blog" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2439"/>
    </linearGradient>
    <linearGradient id="tg_blog" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_blog)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative background circles -->
  <circle cx="250" cy="480" r="200" fill="#2563eb" opacity="0.06"/>
  <circle cx="950" cy="180" r="240" fill="#1d4ed8" opacity="0.05"/>

  <!-- === ARTICLE CARD - Large center === -->
  <rect x="380" y="160" width="440" height="310" rx="16" fill="#ffffff" opacity="0.1"/>
  <!-- Card header bar -->
  <rect x="380" y="160" width="440" height="50" rx="16" fill="url(#tg_blog)" opacity="0.6"/>
  <rect x="380" y="194" width="440" height="16" fill="url(#tg_blog)" opacity="0.6"/>
  <!-- Title lines -->
  <rect x="410" y="232" width="300" height="10" rx="5" fill="#ffffff" opacity="0.45"/>
  <rect x="410" y="254" width="240" height="10" rx="5" fill="#ffffff" opacity="0.35"/>
  <!-- Body text lines -->
  <rect x="410" y="286" width="380" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="410" y="302" width="360" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="410" y="318" width="340" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="410" y="334" width="370" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="410" y="350" width="280" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
  <!-- Tags -->
  <rect x="410" y="390" width="60" height="22" rx="11" fill="#2563eb" opacity="0.3"/>
  <rect x="480" y="390" width="50" height="22" rx="11" fill="#2563eb" opacity="0.3"/>
  <rect x="540" y="390" width="70" height="22" rx="11" fill="#2563eb" opacity="0.3"/>
  <!-- Read more -->
  <rect x="410" y="430" width="100" height="8" rx="4" fill="#2563eb" opacity="0.5"/>

  <!-- === ARTICLE CARD - Left small === -->
  <rect x="80" y="200" width="240" height="200" rx="14" fill="#ffffff" opacity="0.08"/>
  <rect x="80" y="200" width="240" height="40" rx="14" fill="url(#tg_blog)" opacity="0.4"/>
  <rect x="80" y="228" width="240" height="12" fill="url(#tg_blog)" opacity="0.4"/>
  <rect x="100" y="258" width="180" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
  <rect x="100" y="276" width="140" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="100" y="304" width="200" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <rect x="100" y="318" width="180" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <rect x="100" y="332" width="160" height="5" rx="2.5" fill="#ffffff" opacity="0.12"/>
  <rect x="100" y="364" width="45" height="18" rx="9" fill="#2563eb" opacity="0.2"/>
  <rect x="152" y="364" width="55" height="18" rx="9" fill="#2563eb" opacity="0.2"/>

  <!-- === ARTICLE CARD - Right small === -->
  <rect x="880" y="230" width="240" height="200" rx="14" fill="#ffffff" opacity="0.08"/>
  <rect x="880" y="230" width="240" height="40" rx="14" fill="url(#tg_blog)" opacity="0.4"/>
  <rect x="880" y="258" width="240" height="12" fill="url(#tg_blog)" opacity="0.4"/>
  <rect x="900" y="288" width="180" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
  <rect x="900" y="306" width="140" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="900" y="334" width="200" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <rect x="900" y="348" width="180" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <rect x="900" y="362" width="160" height="5" rx="2.5" fill="#ffffff" opacity="0.12"/>
  <rect x="900" y="394" width="45" height="18" rx="9" fill="#2563eb" opacity="0.2"/>
  <rect x="952" y="394" width="55" height="18" rx="9" fill="#2563eb" opacity="0.2"/>

  <!-- === PENCIL ICON - top right of main card === -->
  <g transform="translate(770, 140) rotate(-45)">
    <rect x="0" y="0" width="8" height="40" rx="2" fill="#ffffff" opacity="0.5"/>
    <polygon points="0,40 4,-4 8,40" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Scattered decorative dots -->
  <circle cx="500" cy="130" r="3" fill="#2563eb" opacity="0.3"/>
  <circle cx="700" cy="520" r="4" fill="#2563eb" opacity="0.2"/>
  <circle cx="180" cy="450" r="3" fill="#ffffff" opacity="0.1"/>
  <circle cx="1020" cy="480" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="600" cy="540" r="3" fill="#2563eb" opacity="0.15"/>
</svg>
