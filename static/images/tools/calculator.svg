<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg_calc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3650"/>
      <stop offset="100%" style="stop-color:#0f2439"/>
    </linearGradient>
    <linearGradient id="tg_calc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_calc)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative background circles -->
  <circle cx="200" cy="500" r="200" fill="#16a34a" opacity="0.06"/>
  <circle cx="1000" cy="150" r="240" fill="#15803d" opacity="0.05"/>

  <!-- === CENTRAL CALCULATOR === -->
  <rect x="460" y="170" width="280" height="340" rx="20" fill="#ffffff" opacity="0.12"/>
  <!-- Display -->
  <rect x="485" y="195" width="230" height="60" rx="10" fill="#0f2439" opacity="0.6"/>
  <text x="695" y="236" fill="#16a34a" font-size="28" font-weight="bold" text-anchor="end" font-family="monospace" opacity="0.9">€ 2.450</text>
  <!-- Button grid -->
  <g opacity="0.8">
    <rect x="485" y="275" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="545" y="275" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="605" y="275" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="665" y="275" width="50" height="40" rx="8" fill="url(#tg_calc)" opacity="0.5"/>
    <rect x="485" y="325" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="545" y="325" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="605" y="325" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="665" y="325" width="50" height="40" rx="8" fill="url(#tg_calc)" opacity="0.5"/>
    <rect x="485" y="375" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="545" y="375" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="605" y="375" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="665" y="375" width="50" height="40" rx="8" fill="url(#tg_calc)" opacity="0.5"/>
    <rect x="485" y="425" width="110" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="605" y="425" width="50" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="665" y="425" width="50" height="40" rx="8" fill="url(#tg_calc)" opacity="0.7"/>
  </g>

  <!-- === COIN STACK - Left side === -->
  <g transform="translate(160, 280)">
    <ellipse cx="0" cy="0" rx="45" ry="12" fill="#fbbf24" opacity="0.3"/>
    <ellipse cx="0" cy="-15" rx="45" ry="12" fill="#fbbf24" opacity="0.35"/>
    <ellipse cx="0" cy="-30" rx="45" ry="12" fill="#fbbf24" opacity="0.4"/>
    <ellipse cx="0" cy="-45" rx="45" ry="12" fill="#fbbf24" opacity="0.45"/>
    <ellipse cx="0" cy="-60" rx="45" ry="12" fill="#fbbf24" opacity="0.5"/>
    <rect x="-45" y="-60" width="90" height="60" fill="#fbbf24" opacity="0.15"/>
    <text x="0" y="-52" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif" opacity="0.7">€</text>
  </g>

  <!-- Smaller coin stack -->
  <g transform="translate(280, 350)">
    <ellipse cx="0" cy="0" rx="35" ry="10" fill="#fbbf24" opacity="0.25"/>
    <ellipse cx="0" cy="-12" rx="35" ry="10" fill="#fbbf24" opacity="0.3"/>
    <ellipse cx="0" cy="-24" rx="35" ry="10" fill="#fbbf24" opacity="0.35"/>
    <rect x="-35" y="-24" width="70" height="24" fill="#fbbf24" opacity="0.1"/>
  </g>

  <!-- === BAR CHART - Right side === -->
  <g transform="translate(880, 200)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
    <line x1="0" y1="200" x2="200" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
    <!-- Bars -->
    <rect x="20" y="100" width="30" height="100" rx="4" fill="url(#tg_calc)" opacity="0.5"/>
    <rect x="65" y="60" width="30" height="140" rx="4" fill="url(#tg_calc)" opacity="0.65"/>
    <rect x="110" y="30" width="30" height="170" rx="4" fill="url(#tg_calc)" opacity="0.8"/>
    <rect x="155" y="80" width="30" height="120" rx="4" fill="#ffffff" opacity="0.2"/>
    <!-- Trend line -->
    <polyline points="35,90 80,50 125,20 170,70" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <circle cx="35" cy="90" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="80" cy="50" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="125" cy="20" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="170" cy="70" r="4" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- === Floating euro signs === -->
  <text x="380" y="250" fill="#ffffff" font-size="20" opacity="0.08" font-family="sans-serif" font-weight="bold">€</text>
  <text x="800" y="460" fill="#ffffff" font-size="24" opacity="0.06" font-family="sans-serif" font-weight="bold">€</text>
  <text x="140" y="450" fill="#ffffff" font-size="18" opacity="0.06" font-family="sans-serif" font-weight="bold">€</text>

  <!-- === Receipt / result card - Bottom right === -->
  <rect x="920" y="430" width="180" height="130" rx="12" fill="#ffffff" opacity="0.08"/>
  <rect x="940" y="452" width="140" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="940" y="470" width="100" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
  <line x1="940" y1="490" x2="1080" y2="490" stroke="#ffffff" stroke-width="1" stroke-dasharray="4" opacity="0.15"/>
  <rect x="940" y="502" width="60" height="7" rx="3.5" fill="#ffffff" opacity="0.15"/>
  <rect x="1020" y="502" width="60" height="7" rx="3.5" fill="url(#tg_calc)" opacity="0.5"/>
  <rect x="940" y="525" width="140" height="5" rx="2.5" fill="#ffffff" opacity="0.1"/>

  <!-- Scattered decorative dots -->
  <circle cx="500" cy="560" r="3" fill="#16a34a" opacity="0.3"/>
  <circle cx="700" cy="150" r="3" fill="#16a34a" opacity="0.25"/>
  <circle cx="350" cy="200" r="4" fill="#16a34a" opacity="0.2"/>
  <circle cx="850" cy="160" r="3" fill="#16a34a" opacity="0.2"/>
  <circle cx="200" cy="180" r="3" fill="#ffffff" opacity="0.1"/>
  <circle cx="1050" cy="380" r="3" fill="#ffffff" opacity="0.1"/>
</svg>