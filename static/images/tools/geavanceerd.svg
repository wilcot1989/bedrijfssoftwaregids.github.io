<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg_adv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#064e6e"/>
    </linearGradient>
    <linearGradient id="tg_adv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_adv)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative background circles -->
  <circle cx="250" cy="480" r="200" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="950" cy="180" r="240" fill="#7c3aed" opacity="0.05"/>

  <!-- === CENTRAL DASHBOARD === -->
  <rect x="380" y="170" width="440" height="300" rx="16" fill="#ffffff" opacity="0.08"/>
  <!-- Dashboard header -->
  <rect x="380" y="170" width="440" height="40" rx="16" fill="url(#tg_adv)" opacity="0.4"/>
  <!-- Window dots -->
  <circle cx="405" cy="190" r="5" fill="#ffffff" opacity="0.4"/>
  <circle cx="422" cy="190" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="439" cy="190" r="5" fill="#ffffff" opacity="0.2"/>

  <!-- Dashboard panels -->
  <!-- Panel 1: mini chart -->
  <rect x="400" y="225" width="190" height="100" rx="8" fill="#ffffff" opacity="0.06"/>
  <polyline points="415,300 440,280 465,290 490,260 515,270 540,240 565,250" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7"/>
  <circle cx="565" cy="250" r="4" fill="#8b5cf6" opacity="0.8"/>

  <!-- Panel 2: donut chart -->
  <rect x="610" y="225" width="190" height="100" rx="8" fill="#ffffff" opacity="0.06"/>
  <circle cx="705" cy="275" r="32" fill="none" stroke="url(#tg_adv)" stroke-width="10" opacity="0.6" stroke-dasharray="130 70"/>
  <circle cx="705" cy="275" r="32" fill="none" stroke="#fbbf24" stroke-width="10" opacity="0.4" stroke-dasharray="0 130 70 0"/>
  <text x="705" y="281" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif" opacity="0.6">78%</text>

  <!-- Panel 3: KPI cards -->
  <rect x="400" y="340" width="90" height="55" rx="6" fill="#ffffff" opacity="0.06"/>
  <rect x="415" y="354" width="60" height="8" rx="4" fill="url(#tg_adv)" opacity="0.5"/>
  <rect x="415" y="370" width="45" height="6" rx="3" fill="#ffffff" opacity="0.15"/>

  <rect x="505" y="340" width="90" height="55" rx="6" fill="#ffffff" opacity="0.06"/>
  <rect x="520" y="354" width="60" height="8" rx="4" fill="#16a34a" opacity="0.5"/>
  <rect x="520" y="370" width="45" height="6" rx="3" fill="#ffffff" opacity="0.15"/>

  <rect x="610" y="340" width="90" height="55" rx="6" fill="#ffffff" opacity="0.06"/>
  <rect x="625" y="354" width="60" height="8" rx="4" fill="#fbbf24" opacity="0.5"/>
  <rect x="625" y="370" width="45" height="6" rx="3" fill="#ffffff" opacity="0.15"/>

  <rect x="715" y="340" width="85" height="55" rx="6" fill="#ffffff" opacity="0.06"/>
  <rect x="730" y="354" width="55" height="8" rx="4" fill="#ef4444" opacity="0.4"/>
  <rect x="730" y="370" width="40" height="6" rx="3" fill="#ffffff" opacity="0.15"/>

  <!-- Panel 4: bar chart -->
  <rect x="400" y="405" width="400" height="50" rx="6" fill="#ffffff" opacity="0.04"/>
  <rect x="415" y="420" width="30" height="25" rx="3" fill="url(#tg_adv)" opacity="0.4"/>
  <rect x="455" y="415" width="30" height="30" rx="3" fill="url(#tg_adv)" opacity="0.5"/>
  <rect x="495" y="425" width="30" height="20" rx="3" fill="url(#tg_adv)" opacity="0.35"/>
  <rect x="535" y="410" width="30" height="35" rx="3" fill="url(#tg_adv)" opacity="0.6"/>
  <rect x="575" y="418" width="30" height="27" rx="3" fill="url(#tg_adv)" opacity="0.45"/>
  <rect x="615" y="422" width="30" height="23" rx="3" fill="url(#tg_adv)" opacity="0.38"/>
  <rect x="655" y="408" width="30" height="37" rx="3" fill="url(#tg_adv)" opacity="0.65"/>

  <!-- === GEAR - Left side === -->
  <g transform="translate(180, 300)" opacity="0.25">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8b5cf6" stroke-width="8"/>
    <circle cx="0" cy="0" r="18" fill="#8b5cf6" opacity="0.4"/>
    <!-- Gear teeth -->
    <rect x="-7" y="-52" width="14" height="16" rx="3" fill="#8b5cf6"/>
    <rect x="-7" y="36" width="14" height="16" rx="3" fill="#8b5cf6"/>
    <rect x="-52" y="-7" width="16" height="14" rx="3" fill="#8b5cf6"/>
    <rect x="36" y="-7" width="16" height="14" rx="3" fill="#8b5cf6"/>
    <rect x="28" y="-38" width="14" height="14" rx="3" fill="#8b5cf6" transform="rotate(45, 35, -31)"/>
    <rect x="-42" y="24" width="14" height="14" rx="3" fill="#8b5cf6" transform="rotate(45, -35, 31)"/>
    <rect x="24" y="28" width="14" height="14" rx="3" fill="#8b5cf6" transform="rotate(45, 31, 35)"/>
    <rect x="-38" y="-42" width="14" height="14" rx="3" fill="#8b5cf6" transform="rotate(45, -31, -35)"/>
  </g>

  <!-- Smaller gear -->
  <g transform="translate(260, 400)" opacity="0.15">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#8b5cf6" stroke-width="6"/>
    <circle cx="0" cy="0" r="10" fill="#8b5cf6" opacity="0.4"/>
    <rect x="-5" y="-35" width="10" height="12" rx="2" fill="#8b5cf6"/>
    <rect x="-5" y="23" width="10" height="12" rx="2" fill="#8b5cf6"/>
    <rect x="-35" y="-5" width="12" height="10" rx="2" fill="#8b5cf6"/>
    <rect x="23" y="-5" width="12" height="10" rx="2" fill="#8b5cf6"/>
  </g>

  <!-- === GAUGE - Right side === -->
  <g transform="translate(1020, 350)">
    <path d="M -60 0 A 60 60 0 0 1 60 0" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.1"/>
    <path d="M -60 0 A 60 60 0 0 1 35 -49" fill="none" stroke="url(#tg_adv)" stroke-width="8" opacity="0.6"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="25" y2="-42" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#fbbf24" opacity="0.7"/>
    <!-- Labels -->
    <rect x="-20" y="12" width="40" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- === Data flow lines === -->
  <line x1="260" y1="300" x2="380" y2="280" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15" stroke-dasharray="6 4"/>
  <line x1="260" y1="400" x2="380" y2="380" stroke="#8b5cf6" stroke-width="1.5" opacity="0.12" stroke-dasharray="6 4"/>
  <line x1="820" y1="300" x2="960" y2="320" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15" stroke-dasharray="6 4"/>

  <!-- Scattered decorative dots -->
  <circle cx="500" cy="550" r="3" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="700" cy="140" r="3" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="350" cy="180" r="4" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="850" cy="510" r="3" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="130" cy="200" r="3" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="250" r="3" fill="#ffffff" opacity="0.1"/>
</svg>