<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg_kh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2439"/>
    </linearGradient>
    <linearGradient id="tg_kh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg_kh)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative background circles -->
  <circle cx="250" cy="480" r="200" fill="#2563eb" opacity="0.06"/>
  <circle cx="950" cy="180" r="240" fill="#1d4ed8" opacity="0.05"/>

  <!-- === CENTRAL CROSSROADS / DECISION PATH === -->
  <!-- Main path lines -->
  <line x1="600" y1="200" x2="600" y2="350" stroke="#2563eb" stroke-width="4" opacity="0.5"/>
  <line x1="600" y1="350" x2="420" y2="470" stroke="#2563eb" stroke-width="3" opacity="0.4"/>
  <line x1="600" y1="350" x2="780" y2="470" stroke="#2563eb" stroke-width="3" opacity="0.4"/>

  <!-- Decision node (diamond) -->
  <g transform="translate(600,350)">
    <rect x="-28" y="-28" width="56" height="56" rx="8" fill="url(#tg_kh)" transform="rotate(45)"/>
    <text x="0" y="6" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle" font-family="sans-serif">?</text>
  </g>

  <!-- Path node left -->
  <circle cx="420" cy="470" r="22" fill="#ffffff" opacity="0.85"/>
  <text x="420" y="477" fill="#1e3a5f" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">A</text>

  <!-- Path node right -->
  <circle cx="780" cy="470" r="22" fill="#ffffff" opacity="0.85"/>
  <text x="780" y="477" fill="#1e3a5f" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">B</text>

  <!-- Start node -->
  <circle cx="600" cy="200" r="18" fill="url(#tg_kh)"/>
  <circle cx="600" cy="200" r="8" fill="#ffffff" opacity="0.9"/>

  <!-- === CHECKLIST CARD - Left side === -->
  <rect x="80" y="180" width="200" height="240" rx="14" fill="#ffffff" opacity="0.1"/>
  <rect x="80" y="180" width="200" height="40" rx="14" fill="url(#tg_kh)" opacity="0.5"/>
  <!-- Checkboxes -->
  <rect x="105" y="240" width="16" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <polyline points="108,249 113,254 120,244" fill="none" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <rect x="130" y="242" width="120" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
  <rect x="105" y="275" width="16" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <polyline points="108,284 113,289 120,279" fill="none" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <rect x="130" y="277" width="100" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
  <rect x="105" y="310" width="16" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="130" y="312" width="110" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="105" y="345" width="16" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="130" y="347" width="90" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  <rect x="105" y="380" width="16" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="130" y="382" width="105" height="6" rx="3" fill="#ffffff" opacity="0.2"/>

  <!-- === RESULT CARD - Right side === -->
  <rect x="920" y="200" width="200" height="220" rx="14" fill="#ffffff" opacity="0.1"/>
  <rect x="920" y="200" width="200" height="40" rx="14" fill="url(#tg_kh)" opacity="0.5"/>
  <!-- Star rating -->
  <text x="960" y="268" fill="#fbbf24" font-size="16" font-family="sans-serif">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <!-- Result lines -->
  <rect x="945" y="286" width="150" height="6" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="945" y="306" width="120" height="5" rx="2.5" fill="#ffffff" opacity="0.2"/>
  <!-- Progress bar -->
  <rect x="945" y="335" width="150" height="8" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="945" y="335" width="120" height="8" rx="4" fill="url(#tg_kh)" opacity="0.6"/>
  <!-- Button -->
  <rect x="945" y="365" width="100" height="30" rx="6" fill="url(#tg_kh)" opacity="0.7"/>
  <rect x="960" y="377" width="70" height="6" rx="3" fill="#ffffff" opacity="0.6"/>

  <!-- === Small floating question marks === -->
  <text x="340" y="200" fill="#ffffff" font-size="22" opacity="0.12" font-family="sans-serif" font-weight="bold">?</text>
  <text x="860" y="180" fill="#ffffff" font-size="18" opacity="0.1" font-family="sans-serif" font-weight="bold">?</text>
  <text x="480" y="520" fill="#ffffff" font-size="20" opacity="0.08" font-family="sans-serif" font-weight="bold">?</text>
  <text x="720" y="540" fill="#ffffff" font-size="16" opacity="0.08" font-family="sans-serif" font-weight="bold">?</text>

  <!-- === Arrow indicators === -->
  <!-- Arrow left -->
  <line x1="390" y1="480" x2="350" y2="500" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <polygon points="345,498 355,505 358,494" fill="#ffffff" opacity="0.3"/>
  <!-- Arrow right -->
  <line x1="810" y1="480" x2="850" y2="500" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <polygon points="855,498 845,505 842,494" fill="#ffffff" opacity="0.3"/>

  <!-- Scattered decorative dots -->
  <circle cx="500" cy="160" r="3" fill="#2563eb" opacity="0.3"/>
  <circle cx="700" cy="170" r="3" fill="#2563eb" opacity="0.25"/>
  <circle cx="450" cy="530" r="4" fill="#2563eb" opacity="0.2"/>
  <circle cx="750" cy="540" r="3" fill="#2563eb" opacity="0.2"/>
  <circle cx="300" cy="350" r="3" fill="#ffffff" opacity="0.1"/>
  <circle cx="900" cy="380" r="3" fill="#ffffff" opacity="0.1"/>
</svg>