<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60" role="img" aria-label="Aanbevolen door Bedrijfssoftwaregids.nl">
  <title>Aanbevolen door Bedrijfssoftwaregids.nl</title>
  <defs>
    <filter id="shadow-light" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#2D5F2D" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="60" rx="8" ry="8" fill="#ffffff" filter="url(#shadow-light)"/>

  <!-- Green border -->
  <rect x="1.5" y="1.5" width="197" height="57" rx="7" ry="7" fill="none" stroke="#2D5F2D" stroke-width="1.5"/>

  <!-- Checkmark icon area -->
  <circle cx="22" cy="30" r="11" fill="#2D5F2D" opacity="0.1"/>
  <text x="22" y="35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D5F2D" text-anchor="middle">✓</text>

  <!-- Divider line -->
  <line x1="40" y1="14" x2="40" y2="46" stroke="#2D5F2D" stroke-width="0.5" opacity="0.4"/>

  <!-- Top text: "Aanbevolen door" -->
  <text x="121" y="23" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#4a8a4a" text-anchor="middle" letter-spacing="0.5">AANBEVOLEN DOOR</text>

  <!-- Bottom text: "Bedrijfssoftwaregids.nl" -->
  <text x="121" y="42" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#2D5F2D" text-anchor="middle" letter-spacing="-0.2">Bedrijfssoftwaregids.nl</text>
</svg>
